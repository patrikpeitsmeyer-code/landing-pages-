  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {

      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      padding: 18px;

      color: #F5F2ED;
    }
    .name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
    .co { font-size: 12px; color: #F97316; }

</head>
